*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI","Microsoft YaHei",sans-serif;line-height:1.6}
.container{max-width:1280px;margin:0 auto;padding:24px}
header{text-align:center;padding:24px 0}
header h1{font-size:28px;color:#fff}
header .sub{color:var(--muted);margin-top:6px}
.stats-bar{display:flex;justify-content:center;flex-wrap:wrap;gap:32px;margin:20px 0}
.stat{text-align:center}
.stat .n{font-size:26px;font-weight:700;color:var(--highlight)}
.stat .l{font-size:13px;color:var(--muted)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:24px}
.card h2{font-size:18px;color:#fff;margin-bottom:14px;border-left:4px solid var(--highlight);padding-left:10px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.chart-wrap{position:relative;height:380px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;vertical-align:top}
th{color:#fff;cursor:pointer;user-select:none;background:var(--accent)}
th:hover{background:var(--accent-light,#1a5276)}
td a{color:var(--blue);text-decoration:none}
.badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;color:#fff}
.timeline{position:relative;padding-left:26px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:rgba(255,255,255,.12)}
.tl-item{position:relative;margin-bottom:18px}
.tl-item::before{content:'';position:absolute;left:-22px;top:5px;width:12px;height:12px;border-radius:50%;background:var(--muted);box-shadow:0 0 0 3px var(--card)}
.tl-item.high::before{background:var(--red)}
.tl-item.mid::before{background:var(--gold)}
.tl-item.low::before{background:var(--muted)}
.tl-date{font-size:12px;color:var(--muted)}
.tl-title{font-weight:600;color:#fff;margin:2px 0}
.tl-sum{font-size:13px;color:var(--text)}
.tag{display:inline-block;font-size:11px;padding:1px 7px;border-radius:8px;background:var(--accent);color:var(--text);margin-right:6px}
.acard{border:1px solid rgba(255,255,255,.08);border-radius:10px;margin-bottom:12px;overflow:hidden}
.ahead{padding:14px 16px;cursor:pointer;font-weight:600;color:#fff;background:var(--accent);display:flex;justify-content:space-between}
.abody{max-height:0;overflow:hidden;transition:max-height .35s ease;padding:0 16px}
.acard.open .abody{max-height:1600px;padding:14px 16px}
.abody p{margin:8px 0;font-size:14px}
.abody .q{color:var(--gold);font-weight:600}
.abody table{margin-top:8px}
footer{text-align:center;color:var(--muted);font-size:13px;padding:20px 0}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}.stats-bar{gap:18px}}
@media(max-width:520px){.container{padding:10px}.card{padding:16px}}
</style>
</head>

  options:{responsive:true,maintainAspectRatio:false,scales:{r:{suggestedMin:0,suggestedMax:10,grid:{color:'rgba(255,255,255,.1)'},angleLines:{color:'rgba(255,255,255,.1)'}}},plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:9}}}}}});

// ② price bar
new Chart(document.getElementById('cPrice'),{type:'bar',
  data:{labels:DATA.aiModels.map(function(m){return m.name;}),
    datasets:[{label:'输入',data:DATA.aiModels.map(function(m){return m.pricing.input;}),backgroundColor:'#3498db'},
              {label:'输出',data:DATA.aiModels.map(function(m){return m.pricing.output;}),backgroundColor:'#e94560'}]},
  options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{position:'top'}},scales:{x:{grid:{color:'rgba(255,255,255,.06)'}}}}});

// ③ stock dual axis
new Chart(document.getElementById('cStock'),{type:'line',
  data:{labels:DATA.stockMarket.map(function(s){return s.date;}),
    datasets:[
      {label:'上证综指',yAxisID:'y',data:DATA.stockMarket.map(function(s){return s.a||null;}),borderColor:'#e74c3c',backgroundColor:rgba('#e74c3c',.15),fill:true,tension:.3,spanGaps:true},
      {label:'纳斯达克',yAxisID:'y1',data:DATA.stockMarket.map(function(s){return s.us||null;}),borderColor:'#3498db',backgroundColor:rgba('#3498db',.12),fill:true,tension:.3,spanGaps:true},
      {label:'恒生科技',yAxisID:'y1',data:DATA.stockMarket.map(function(s){return s.hk||null;}),borderColor:'#2ecc71',backgroundColor:rgba('#2ecc71',.12),fill:true,tension:.3,spanGaps:true}]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{position:'left',title:{display:true,text:'上证综指'},grid:{color:'rgba(255,255,255,.06)'}},y1:{position:'right',title:{display:true,text:'纳斯达克/恒生科技'},grid:{drawOnChartArea:false}}}}});

// ④ semiconductor
new Chart(document.getElementById('cSemi'),{type:'bar',
  data:{labels:DATA.semi.map(function(s){return s.label;}),
    datasets:[{label:'数值',data:DATA.semi.map(function(s){return s.value;}),backgroundColor:DATA.semi.map(function(s,i){return PALETTE[i%PALETTE.length];})}]},
  options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.06)'}}}}});

// ⑤ papers table sortable
(function(){
  var tb=document.querySelector('#paperTable tbody'),rows=DATA.papers.slice(),asc={};
  function render(){tb.innerHTML=rows.map(function(p){return '<tr><td>'+p.title+'</td><td>'+p.authors+'</td><td>'+p.conference+'</td><td>'+p.summary+'</td><td><a href="'+p.url+'" target="_blank">arXiv</a></td></tr>';}).join('');}
  render();
  document.querySelectorAll('#paperTable th[data-k]').forEach(function(th){th.onclick=function(){var k=th.dataset.k;asc[k]=!asc[k];rows.sort(function(a,b){return asc[k]?(''+a[k]).localeCompare(''+b[k]):(''+b[k]).localeCompare(''+a[k]);});render();};});
})();

// ⑥ analysis cards
(function(){
  var box=document.getElementById('analysis');
  box.innerHTML=DATA.analysis.map(function(a){
    var q4=a.q4.map(function(r){return '<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>';}).join('');
    return '<div class="acard"><div class="ahead">'+a.title+'<span>▾</span></div><div class="abody">'+
      '<p><span class="q">Q1 真正想解决的问题：</span>'+a.q1+'</p>'+
      '<p><span class="q">Q2 声称的贡献：</span>'+a.q2+'</p>'+
      '<p><span class="q">Q3 最可能被攻击的地方：</span>'+a.q3+'</p>'+
      '<table><thead><tr><th>角色</th><th>建议</th></tr></thead><tbody>'+q4+'</tbody></table></div></div>';
  }).join('');
  box.querySelectorAll('.ahead').forEach(function(h){h.onclick=function(){h.parentNode.classList.toggle('open');};});
})();

// ⑦ timeline
(function(){
  var tl=document.getElementById('timeline'),cls={3:'high',2:'mid',1:'low'},lab={3:'高',2:'中',1:'低'};
  tl.innerHTML=DATA.techNews.map(function(n){return '<div class="tl-item '+cls[n.importance]+'"><div class="tl-date">'+n.date+'</div><div class="tl-title">'+n.title+'</div><div class="tl-sum">'+n.summary+'</div><div style="margin-top:4px"><span class="tag">'+n.category+'</span><span class="tag">重要:'+lab[n.importance]+'</span></div></div>';}).join('');
})();
</script>
