1 它真正想解决的问题是什么？\n苹果需要证明自己在端侧AI竞赛中不落后，让iPhone成为真正的AI Agent入口。\n\nQ2 它声称的贡献是什么？\niOS 27推出全新Siri AI，应用启动速度提升30%，引入儿童适龄保护。\n\nQ3 最可能被攻击的地方？\nP0: 中国大陆不可用；P1: Siri AI能否追上ChatGPT/Gemini；P2: 端侧模型能力受硬件限制。\n\nQ4 行动指南\n博士生：研究端侧模型压缩；工程师：学习iOS AI框架集成；投资人：关注Apple Intelligence对换机周期的拉动。"}, {"title": "4. 美团小美牵手腾讯元宝，构建AI入口", "summary": "美团Q1 AI亏损收窄至65亿元，小美与元宝互通形成AI入口+本地服务闭环。", "content": "Q1 它真正想解决的问题是什么？\n美团有场景缺AI入口，腾讯有元宝入口缺线下场景，合作解决AI Agent落地物理世界问题。\n\nQ2 它声称的贡献是什么？\nAI经营亏损收窄至65亿元，小美与元宝互通，有望形成AI入口+本地服务闭环。\n\nQ3 最可能被攻击的地方？\nP0: 合作是否只是流量互换；P1: 65亿亏损仍巨大；P2: 与阿里千问App直接竞争。\n\nQ4 行动指南\n博士生：研究AI Agent与本地生活服务的任务拆解；工程师：学习跨平台Agent互通架构；投资人：关注AI对单用户价值的提升。"}, {"title": "5. 阿里通义千问Qwen3.7-Max与千问云", "summary": "千问云在新加坡发布，Qwen3.7-Max支持百万词元上下文。", "content": "Q1 它真正想解决的问题是什么？\n阿里需要在B端和开发者市场建立大模型生态壁垒，推动国产大模型出海与商业化。\n\nQ2 它声称的贡献是什么？\n千问云在新加坡发布，Qwen3.7-Max支持百万词元上下文，推进代理AI时代战略。\n\nQ3 最可能被攻击的地方？\nP0: 百万上下文有效利用率如何；P1: 海外市场能否与OpenAI/Google竞争；P2: 618上线是否更多是营销事件。\n\nQ4 行动指南\n博士生：研究长上下文建模；工程师：学习DashScope API和千问云部署；投资人：关注阿里云AI收入增速。"}, {"title": "6. TryOnCrafter：相机可控视频虚拟试衣", "summary": "统一DiT框架通过可渲染4D试衣代理实现任意相机轨迹下的真实感试衣视频生成。", "content": "Q1 它真正想解决的问题是什么？\n电商和时尚零售需要更真实的虚拟试衣体验，支持360度环绕、子弹时间等自由视角。\n\nQ2 它声称的贡献是什么？\nCaM-VVTBench Overall Score 75.47，达到SOTA。\n\nQ3 最可能被攻击的地方？\nP0: 真实场景泛化能力待验证；P1: 生成速度是否满足实时性；P2: 4D代理构建成本高。\n\nQ4 行动指南\n博士生：精读4D人体重建；工程师：学习可渲染代理的工程实现；投资人：关注电商/时尚零售落地场景。"}, {"title": "7. Scaling LLM Reasoning from Minimal Labels", "summary": "半监督框架用200条标注样本达到10-15倍标注数据的传统方法性能。", "content": "Q1 它真正想解决的问题是什么？\n大模型推理提升依赖大量人工标注，该论文解决如何用极少标注数据扩展推理能力。\n\nQ2 它声称的贡献是什么？\n轻量验证器+熵阈值伪标签过滤，200条标注达到传统方法10-15倍数据的性能。\n\nQ3 最可能被攻击的地方？\nP0: 伪标签质量依赖验证器能力；P1: 仅在数学推理和GQA验证；P2: 200条标注实验是否过于理想化。\n\nQ4 行动指南\n博士生：精读半监督推理训练；工程师：集成验证器到数据生成pipeline；投资人：关注可降低标注成本的技术。"}, {"title": "8. Real-Time Voice AI Hears but Does Not Listen", "summary": "评测四个主流实时语音AI系统，发现它们忽略情绪、讽刺、恐惧等副语言信号。", "content": "Q1 它真正想解决的问题是什么？\n实时语音AI在高风险场景中可能只识别文字而不理解情绪，论文揭示这一安全漏洞。\n\nQ2 它声称的贡献是什么？\n测试GPT Realtime 2、Gemini 3.1 Flash Live、Qwen3.5 Omni Plus/Flash，提出语音AI // (e) Papers Table
const tbody = document.querySelector('#papersTable tbody');
function renderPapers(list) {
  tbody.innerHTML = list.map(p => {
    const arxivUrl = p.arxivUrl || p.url || '#';
    const award = p.award || '';
    const institution = p.institution || '';
    const cp = p.commercialPotential != null ? p.commercialPotential : '-';
    return `
    <tr>
      <td>${p.title}${award ? '<span class="award">'+award+'</span>' : ''}</td>
      <td>${p.conference}</td>
      <td>${institution}</td>
      <td>${cp}</td>
      <td><a href="${arxivUrl}" target="_blank" style="color:#58d68d;">arXiv</a></td>
    </tr>
  `;
  }).join('');
}
renderPapers(DATA.papers);
let sortDir = {};
function sortTable(col) {
  const key = ['title','conference','institution','commercialPotential'][col];
  sortDir[key] = !sortDir[key];
  const sorted = [...DATA.papers].sort((a,b) => {
    let va = a[key] != null ? a[key] : (typeof b[key] === 'number' ? 0 : '');
    let vb = b[key] != null ? b[key] : (typeof a[key] === 'number' ? 0 : '');
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return sortDir[key] ? -1 : 1;
    if (va > vb) return sortDir[key] ? 1 : -1;
    return 0;
  });
  renderPapers(sorted);
}

`).join('');
function toggleAnalysis(idx) {
  const body = document.getElementById('analysis-'+idx);
