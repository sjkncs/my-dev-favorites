<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #0f3460;
  --text: #e0e0e0;
  --muted: #a0a0a0;
  --accent-light: #1a5276;
  --highlight: #e94560;
  --gold: #f0c040;
  --green: #2ecc71;
  --blue: #3498db;
  --purple: #9b59b6;
  --orange: #e67e22;
  --cyan: #1abc9c;
  --red: #e74c3c;
  --radius: 12px;
  --shadow: 0 4px 20px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  line-height: 1.6;
}
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
header { text-align: center; margin-bottom: 24px; }
header h1 { margin: 0; font-size: 2rem; color: #fff; }
header p { margin: 6px 0 0; color: var(--muted); }
.stats-bar {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 16px;
  margin-bottom: 28px;
}
.stat {
  background: var(--card); padding: 16px 22px; border-radius: var(--radius);
  box-shadow: var(--shadow); min-width: 120px; text-align: center;
}
.stat .num { font-size: 1.6rem; font-weight: bold; color: var(--highlight); }
.stat .label { font-size: 0.85rem; color: var(--muted); }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
.grid-1 { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
.card {
  background: var(--card); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow);
}
.card h2 { margin: 0 0 16px; font-size: 1.15rem; color: #fff; border-left: 4px solid var(--highlight); padding-left: 10px; }
.chart-wrap { position: relative; height: 360px; }
.chart-wrap.small { height: 300px; }
.model-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
th, td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); text-align: left; }
th { cursor: pointer; background: var(--accent); color: #fff; position: sticky; top: 0; }
tr:hover { background: rgba(255,255,255,0.04); }
td a { color: var(--blue); text-decoration: none; }
td a:hover { text-decoration: underline; }
.award-gold { color: var(--gold); font-weight: bold; }
.award-silver { color: #c0c0c0; font-weight: bold; }

.analysis-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.expand-card { background: var(--accent); border-radius: var(--radius); overflow: hidden; }
.expand-header {
  padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  font-weight: bold; color: #fff;
}
.expand-header:hover { background: var(--accent-light); }
.expand-body {
  max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
  background: rgba(0,0,0,0.15);
}
.expand-card.open .expand-body { max-height: 1200px; }
.expand-body-inner { padding: 16px; }
.expand-body h4 { margin: 12px 0 6px; color: var(--cyan); font-size: 0.95rem; }
.expand-body p { margin: 0 0 10px; color: var(--text); font-size: 0.9rem; }
.advice-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.85rem; }
.advice-table th, .advice-table td { padding: 8px; border: 1px solid rgba(255,255,255,0.08); }
.advice-table th { background: rgba(255,255,255,0.08); text-align: left; }

.timeline { position: relative; padding-left: 28px; }
.timeline::before {
  content: ''; position: absolute; left: 8px; top: 6px; bottom: 6px; width: 2px;
  background: rgba(255,255,255,0.12);
}
.tl-item { position: relative; margin-bottom: 18px; }
.tl-item::before {
  content: ''; position: absolute; left: -24px; top: 6px; width: 10px; height: 10px;
  border-radius: 50%; background: var(--muted);
}
.tl-item.high::before { background: var(--red); box-shadow: 0 0 8px var(--red); }
.tl-item.medium::before { background: var(--gold); }
.tl-item.low::before { background: #888; }
.tl-date { font-size: 0.8rem; color: var(--muted); }
.tl-title { font-weight: bold; color: #fff; }
.tl-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
.tl-summary { font-size: 0.9rem; color: var(--text); }

footer { text-align: center; color: var(--muted); font-size: 0.85rem; margin-top: 32px; }

@media(max-width:900px) {
  .grid-2, .analysis-grid, .model-charts { grid-template-columns: 1fr; }
}
@media(max-width:520px) {
  .container { padding: 12px; }
  .card { padding: 14px; }
}
</style>

  const bar = document.getElementById('statsBar');
  let total = 0;
  for (let k in labels) {
    const v = DATA.meta[k] || 0;
    total += v;
    bar.innerHTML += '<div class="stat"><div class="num">'+v+'</div><div class="label">'+labels[k]+'</div></div>';
  }
  bar.innerHTML += '<div class="stat"><div class="num">'+total+'</div><div class="label">总计</div></div>';
}

function renderPapers() {
  const tb = document.getElementById('papersBody');
  tb.innerHTML = DATA.papers.map(p => {
    const awardClass = p.award && p.award.includes('最佳') ? 'award-gold' : (p.award && p.award.includes('杰出') ? 'award-silver' : '');
    return `<tr><td>${p.title}</td><td>${p.authors||''}</td><td>${p.conference||''}</td><td class="${awardClass}">${p.award||''}</td><td>${p.commercialPotential!=null?p.commercialPotential:''}</td><td>${p.summary||''}</td><td>${p.url?`<a href="${p.url}" target="_blank">arXiv</a>`:''}</td></tr>`;
  }).join('');
}

let sortDir = {};
function sortTable(col, type) {
  const tb = document.getElementById('papersBody');
  const rows = Array.from(tb.querySelectorAll('tr'));
  sortDir[col] = !sortDir[col];
  rows.sort((a,b) => {
    let av = a.cells[col].innerText.trim();
    let bv = b.cells[col].innerText.trim();
    if (type === 'num') { av = parseFloat(av) || 0; bv = parseFloat(bv) || 0; }
    if (av < bv) return sortDir[col] ? -1 : 1;
    if (av > bv) return sortDir[col] ? 1 : -1;
    return 0;
  });
  rows.forEach(r => tb.appendChild(r));
}
