// (e) Papers table (sortable)
let papersSort = { key: null, dir: 1 };
function renderPapers(sortKey) {
  const tbody = document.getElementById('papersBody');
  let rows = DATA.papers.map(p => ({
    ...p,
    _award: p.award || '',
    _authors: p.authors || '',
    _institution: p.institution || '',
    _keyMetric: p.keyMetric || '',
    _commercialPotential: p.commercialPotential != null ? p.commercialPotential : '',
    _arxivUrl: p.arxivUrl || p.url || '',
    _pdfUrl: p.pdfUrl || p.url || ''
  }));
  if (sortKey) {
    if (papersSort.key === sortKey) papersSort.dir *= -1; else { papersSort.key = sortKey; papersSort.dir = 1; }
    rows.sort((a,b) => {
      let av = a[sortKey] != null ? a[sortKey] : '';
      let bv = b[sortKey] != null ? b[sortKey] : '';
      if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * papersSort.dir;
      return String(av).localeCompare(String(bv), 'zh') * papersSort.dir;
    });
  }
  tbody.innerHTML = rows.map(p => {
    let awardClass = 'award';
    if (p._award.includes('荣誉')) awardClass += ' award-nom';
    else if (p._award === 'Oral') awardClass += ' award-oral';
    const awardHtml = p._award ? `<span class="${awardClass}">${p._award}</span>` : '';
    const links = [];
    if (p._arxivUrl) links.push(`<a class="link-btn" href="${p._arxivUrl}" target="_blank">arXiv</a>`);
    if (p._pdfUrl && p._pdfUrl !== p._arxivUrl) links.push(`<a class="link-btn" href="${p._pdfUrl}" target="_blank">PDF</a>`);
    return `<tr>
      <td title="${p.title}">${p.title}</td>
      <td>${p.conference}</td>
      <td>${awardHtml}</td>
      <td title="${p._authors}">${p._authors}</td>
      <td title="${p._institution}">${p._institution}</td>
      <td>${p._keyMetric}</td>
      <td>${p._commercialPotential !== '' ? '★'.repeat(p._commercialPotential) + '☆'.repeat(5-p._commercialPotential) : ''}</td>
      <td>${links.join(' ')}</td>
    </tr>`;
  }).join('');
}

}
function importanceLabel(imp) {
  if (imp === 'high' || imp === 5) return '重磅';
  if (imp === 'medium' || imp === 4) return '重要';
  if (imp === 3) return '关注';
  return '一般';
}
const seen = new Set();
const uniqueNews = [];
for (const n of DATA.techNews) {
  const key = n.date + '|' + n.title;
  if (!seen.has(key)) { seen.add(key); uniqueNews.push(n); }
}
uniqueNews.sort((a,b) => a.date.localeCompare(b.date));
const timelineEl = document.getElementById('timeline');
timelineEl.innerHTML = uniqueNews.map(n => {
  const cls = importanceClass(n.importance);
  const tag = importanceLabel(n.importance);
  return `<div class="t-item ${cls}">
    <div class="t-date">${n.date} · ${n.category}</div>
    <div class="t-title">${n.title}</div>
    <div class="t-summary">${n.summary}</div>
    <span class="t-tag">${tag}</span>
  </div>`;
}).join('');
</script>
