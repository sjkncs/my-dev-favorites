<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --bg: #1a1a2e; --card: #16213e; --accent: #0f3460; --text: #e0e0e0; --accent-light: #1a5276; --highlight: #e94560; --gold: #f0c040; --green: #2ecc71; --blue: #3498db; --purple: #9b59b6; --orange: #e67e22; --cyan: #1abc9c; --red: #e74c3c; --radius: 12px; --shadow: 0 4px 20px rgba(0,0,0,0.3); }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; line-height:1.6; }
.container { max-width:1400px; margin:0 auto; padding:24px; }
header { text-align:center; margin-bottom:32px; }
header h1 { font-size:28px; color:#fff; margin-bottom:8px; }
header p { color:#8892b0; font-size:14px; }
.stats-bar { display:flex; justify-content:center; gap:40px; flex-wrap:wrap; margin-bottom:32px; }
.stat-item { text-align:center; }
.stat-value { font-size:32px; font-weight:bold; color:var(--highlight); }
.stat-label { font-size:12px; color:#8892b0; text-transform:uppercase; letter-spacing:1px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:24px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; margin-bottom:24px; }
.card { background:var(--card); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); }
.card h2 { font-size:18px; margin-bottom:16px; color:#fff; border-left:4px solid var(--highlight); padding-left:12px; }
.chart-container { position:relative; height:320px; }
.chart-container-large { position:relative; height:400px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th, td { padding:10px 12px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.06); }
th { background:rgba(255,255,255,0.04); font-weight:600; color:#fff; position:sticky; top:0; }
tr:hover { background:rgba(255,255,255,0.03); }
a { color:var(--blue); text-decoration:none; }
a:hover { text-decoration:underline; }
.timeline { position:relative; padding-left:24px; }
.timeline::before { content:''; position:absolute; left:6px; top:0; bottom:0; width:2px; background:rgba(255,255,255,0.1); }
.timeline-item { position:relative; margin-bottom:16px; padding-left:20px; }
.timeline-item::before { content:''; position:absolute; left:-20px; top:6px; width:10px; height:10px; border-radius:50%; background:var(--blue); }
.timeline-item.high::before { background:var(--red); }
.timeline-item.medium::before { background:var(--gold); }
.timeline-item.low::before { background:#666; }
.timeline-date { font-size:12px; color:#8892b0; margin-bottom:4px; }
.timeline-title { font-size:14px; color:#fff; font-weight:600; }
.timeline-meta { font-size:12px; color:#8892b0; margin-top:4px; }
.timeline-meta span { display:inline-block; padding:2px 8px; border-radius:4px; background:rgba(255,255,255,0.06); margin-right:6px; }
.analysis-card { margin-bottom:12px; border:1px solid rgba(255,255,255,0.06); border-radius:8px; overflow:hidden; }
.analysis-header { padding:14px 18px; background:rgba(255,255,255,0.03); cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
.analysis-header h3 { font-size:15px; color:#fff; }
.analysis-header .toggle { font-size:18px; color:var(--highlight); transition:transform 0.3s; }
.analysis-card.open .toggle { transform:rotate(45deg); }
.analysis-body { max-height:0; overflow:hidden; transition:max-height 0.4s ease; }
.analysis-card.open .analysis-body { max-height:2000px; }
.analysis-body-inner { padding:18px; }
.q-block { margin-bottom:14px; }
.q-block .q-label { font-size:12px; color:var(--highlight); font-weight:bold; margin-bottom:4px; text-transform:uppercase; }
.q-block .q-text { font-size:13px; color:#ccd6f6; line-height:1.7; }
.q-table { width:100%; margin-top:8px; font-size:13px; }
.q-table td { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.06); }
.q-table td:first-child { width:80px; color:var(--gold); font-weight:bold; }
@media(max-width:768px) { .grid-2, .grid-3 { grid-template-columns:1fr } .stats-bar { gap:20px } .chart-container, .chart-container-large { height:260px } }
@media(max-width:520px) { .container { padding:10px } .card { padding:16px } }
</style>
</head>
