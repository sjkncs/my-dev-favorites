称的贡献是什么？", "summary": "", "content": "声称贡献：9个月超短开发周期、推理成本降低约50%、工程样片达到量产标准。这些数字如果属实，将证明非传统芯片公司也能快速推出高性能AI芯片。\n\n#"}, {"title": "Q3: 最可能被reviewer攻击的地方在哪里？", "summary": "", "content": "P0: \"50%成本降低\"是否包含全栈成本（设计、制造、软件生态），还是仅指芯片单位算力成本\nP1: 9个月流片是否依赖博通大量既有IP和成熟方案，OpenAI真实自研比例有多少\nP2: 推理芯片能否支持训练场景，若不能则无法完全替代英伟达生态\n\n#"}, {"title": "Q4: 如果我是同方向从业者，应该精读/学习/模仿/跳过什么？", "summary": "", "content": "- 🎓 博士生：精读定制AI芯片与LLM工作负载协同设计的方法论\n- 👨‍💻 工程师：学习软硬协同优化和推理引擎适配经验\n- 💰 投资人：关注OpenAI供应链\"去英伟达化\"对博通、Marvell等ASIC设计商的利好，以及英伟达护城河是否被侵蚀\n\n---"}, {"title": "2. 美股科技股回调与AI资本开支争议", "summary": "6月25日纳指跌0.43%，大型科技股普跌。市场持续质疑科技巨头大规模AI资本开支是否合理，黄仁勋回应称\"有用的AI已经能够赚钱\"。\n\n#", "content": "\n**概要**: 6月25日纳指跌0.43%，大型科技股普跌。市场持续质疑科技巨头大规模AI资本开支是否合理，黄仁勋回应称\"有用的AI已经能够赚钱\"。\n\n#"}, {"title": "Q1: 它真正想解决的问题是什么？", "summary": "", "content": "本质问题：AI投资是否正在经历从\"信仰驱动\"到\"回报验证\"的转折点。过去两年科技巨头数千亿美元资本开支需要向股东证明回报，否则估值将承压。\n\n#"}, {"title": "Q2: 它声称的贡献是什么？", "summary": "", "content": "声称贡献：黄仁勋称AI回报\"已有答案\"，暗示AI投资已开始产生实际收益。但缺乏具体财务数据支撑。\n\n#"}, {"title": "Q3: 最可能被reviewer攻击的地方在哪里？", "summary": "", "content": "P0: \"有用的AI已经能赚钱\"是定性判断还是可量化的财务事实\nP1: 若AI资本开支回报不及预期，是否会导致2026-2027年资本开支下修\nP2: 股价下跌反映的是短期估值修正，还是AI需求周期见顶\n\n#"}, {"title": "Q4: 如果我是同方向从业者，应该精读/学习/模仿/跳过什么？", "summary": "", "content": "- 🎓 博士生：研究AI资本开支与企业收入/利润的滞后关系\n- 👨‍💻 工程师：关注AI应用层哪些场景真正产生可衡量的商业价值\n- 💰 投资人：区分\"AI需求证伪\"和\"估值过高修正\"两种情景，前者是趋势终结，后者是买入机会\n\n---"}, {"title": "3. A股半导体芯片领涨，科创50涨超3%续创新高", "summary": "6月25日A股半导体芯片方向涨幅居前，科创50指数拉升涨超3%，创业板指涨逾2%，延续科技成长强势格局。\n\n#", "content": "\n**概要**: 6月25日A股半导体芯片方向涨幅居前，科创50指数拉升涨超3%，创业板指涨逾2%，延续科技成长强势格局。\n\n#"}, {"title": "Q1: 它真正想解决的问题是什么？", "summary": "", "content": "本质问题：在地缘政治与AI产业变革双重驱动下，国产半导体自主可控成为长期战略主线。资金正在押注中国半导体产业从\"替代\"走向\"创新\"的拐点。\n\n#"}, {"title": "Q2: 它声称的贡献是什么？", "summary": "", "content": "声称贡献：科创50涨超3%创新高，反映市场对科创板半导体龙头的强烈信心；板块普涨显示资金持续流入。\n\n#"}, {"title": "Q3: 最可能被reviewer攻击的地方在哪里？", "summary": "", "content": "P0: 短期涨幅是否过度透支基本面，部分公司估值是否已远超业绩增速\nP1: 国产替代叙事在先进制程领域仍面临较大技术与设备瓶颈\nP2: 全球半导体周期与A股结构性行情是否完全同步\n\n#"}, {"title": "Q4: 如果我是同方向从业者，应该精读/学习/模仿/跳过什么？", "summary": "", "content": "- 🎓 博士生：研究科创板半导体企业的技术路线图与国际对标差距\n- 👨‍💻 工程师：关注国产EDA、设备、材料的实际突破点\n- 💰 投资人：优选有真实订单和产能释放的龙头，规避纯概念炒作\n\n---"}, {"title": "4. 美团LongCat-Flash-Thinking-2601开源大模型", "summary": "美团发布并开源LongCat-Flash-Thinking-2601，在Agentic Search、Agentic Tool Use、TIR等评测基准上达到开源SOTA，工具调用复杂任务中超越Claude，首个完整开源并支持免费在线体验\"重思考模式\"。\n\n#", "content": "\n**概要**: 美团发布并开源LongCat-Flash-Thinking-2601，在Agentic Search、Agentic Tool Use、TIR等评测基准上达到开源SOTA，工具调用复杂任务中超越Claude，首个完整开源并支持免费在线体验\"重思考模式\"。\n\n#"}, {"title": "Q1: 它真正想解决的问题是什么？", "summary": "", "content": "本质问题：当前开源模型在需要多步工具调用的复杂任务上仍落后于闭源模型（如Claude）。美团希望证明开源社区也能做出顶级的Agent-oriented模型，并借此建立开发者生态。\n\n#"}, {"title": "Q2: 它声称的贡献是什么？", "summary": "", "content": "声称贡献：多个Agent评测基准开源SOTA、工具调用任务超越Claude、首个完整开源+免费在线重思考模式。\n\n#"}, {"title": "Q3: 最可能被reviewer攻击的地方在哪里？", "summary": "", "content": "P0: \"超越Claude\"是否在相同测试条件（prompt、温度、版本）下进行公平比较\nP1: 美团是否有持续投入大模型研发的长期决心，还是短期PR行为\nP2: 重思考模式推理成本如何，能否支撑规模化应用\n\n#"}, {"title": "Q4: 如果我是同方向从业者，应该精读/学习/模仿/跳过什么？", "summary": "", "content": "- 🎓 博士生：精读Agentic Tool Use和TIR基准的评测方法\n- 👨‍💻 工程师：学习其工具调用实现和推理优化方案，复用到自己的Agent系统\n- 💰 投资人：关注美团通过开源大模型降低AI应用成本、提升本地生活业务效率的长期战略价值\n\n---"}, {"title": "5. Grad Detect: 基于梯度的LLM幻觉检测", "summary": "论文提出Grad Detect方法，利用梯度信息识别大语言模型生成的幻觉内容。\n\n#", "content": "\n**概要**: 论文提出Grad Detect方法，利用梯度信息识别大语言模型生成的幻觉内容。\n\n#"}, {"title": "Q1: 它真正想解决的问题是什么？", "summary": "", "content": "本质问题：LLM幻觉是高风险应用场景（医疗、法律、金融）的核心障碍。现有检测方法多基于生成概率或外部检索，Grad Detect尝试从模型内部梯度信号入手，提供更可解释的幻觉预警。\n\n#"}, {"title": "Q2: 它声称的贡献是什么？", "summary": "", "content": "声称贡献：提出新的基于梯度的幻觉检测范式，可能比基于logit的方法更准确地定位幻觉来源。\n\n#"}, {"title": "Q3: 最可能被reviewer攻击的地方在哪里？", "summary": "", "content": "P0: 梯度计算成本远高于前向推理，实际部署可行性如何\nP1: 是否在足够多的模型架构（Decoder-only、Encoder-Decoder、MoE）上验证\nP2: 对对抗性幻觉和语义级幻觉的检测能力是否足够\n\n#"}, {"title": "Q4: 如果我是同方向从业者，应该精读/学习/模仿/跳过什么？", "summary": "", "content": "- 🎓 博士生：精读梯度与模型置信度/不确定性关系的理论分析\n- 👨‍💻 工程师：学习其实现方式，但在生产环境中需谨慎评估计算开销\n- 💰 投资人：关注幻觉检测作为AI安全赛道的细分机会，但需看清规模化瓶颈\n\n---"}, {"title": "6. SHERLOC: 代码修复智能体的结构化诊断定位", "summary": "论文提出SHERLOC框架，为代码修复Agent提供结构化诊断定位能力，帮助Agent更精确地识别错误位置。\n\n#", "content": "\n**概要**: 论文提出SHERLOC框架，为代码修复Agent提供结构化诊断定位能力，帮助Agent更精确地识别错误位置。\n\n#"}, {"title": "Q1: 它真正想解决的问题是什么？", "summary": "", "content": "本质问题：现有AI编程Agent（如GitHub Copilot、Devin）在修复bug时 often 尝试盲目修改多个位置，效率低且容易引入新bug。SHERLOC试图让Agent先\"诊断\"再\"治疗\"，模仿人类工程师的调试过程。\n\n#"}, {"title": "Q2: 它声称的贡献是什么？", "summary": "", "content": "声称贡献：结构化诊断定位提升代码修复Agent的准确性和可解释性，减少无效修改。\n\n#"}, {"title": "Q3: 最可能被reviewer攻击的地方在哪里？", "summary": "", "content": "P0: 诊断定位的精度是否足以覆盖真实世界中复杂的多文件bug\nP1: 结构化表示是否依赖大量手工设计的规则，泛化性如何\nP2: 与现有Agent框架（如SWE-agent）的集成成本是否过高\n\n#"}, {"title": "Q4: 如果我是同方向从业者，应该精读/学习/模仿/跳过什么？", "summary": "", "content": "- 🎓 博士生：精读\"诊断-修复\"两阶段框架的设计和训练策略\n- 👨‍💻 工程师：学习将SHERLOC集成到现有AI编程工具中的方法\n- 💰 投资人：这是AI Coding Agent能力跃迁的关键方向之一，值得关注\n\n---"}, {"title": "7. OpenMontage: AI编码助手变视频工作室", "summary": "GitHub trending仓库OpenMontage将AI coding assistant扩展为完整视频生产工作室，短时间内获得近4000 star增长。\n\n#", "content": "\n**概要**: GitHub trending仓库OpenMontage将AI coding assistant扩展为完整视频生产工作室，短时间内获得近4000 star增长。\n\n#"}, {"title": "Q1: 它真正想解决的问题是什么？", "summary": "", "content": "本质问题：视频制作门槛高、工具链复杂。OpenMontage尝试用Agent方式统一脚本、素材、剪辑、配音、字幕等环节，让开发者用自然语言生成视频。\n\n#"}, {"title": "Q2: 它声称的贡献是什么？", "summary": "", "content": "声称贡献：+3,719 stars trending，说明社区对\"AI coding assistant → video studio\"方向的高度兴趣。\n\n#"}, {"title": "Q3: 最可能被reviewer攻击的地方在哪里？", "summary": "", "content": "P0: 视频生成的实际质量是否达到可用水平，还是仅停留在demo阶段\nP1: 版权、肖像权、素材授权问题如何解决\nP2: 与Runway、Pika等专业视频生成工具相比差异化在哪\n\n#"}, {"title": "Q4: 如果我是同方向从业者，应该精读/学习/模仿/跳过什么？", "summary": "", "content": "- 🎓 博士生：研究多模态Agent的工作流编排方法\n- 👨‍💻 工程师：学习其将代码生成能力迁移到视频生产Pipeline的思路\n- 💰 投资人：关注AIGC视频创作工具的社区热度，但需区分真实PMF和短期 hype"}], "news": [{"date": "2026-06-25", "title": "OpenAI发布首款自研AI推理芯片Jalapeño，与博通合作9个月流片", "category": "芯片", "importance": "high", "summary": "OpenAI与博通（Broadcom）联合发布首款定制AI推理芯片Jalapeño，专为大语言模型推理设计，9个月完成流片，预计可节省约50%推理成本。", "keyData": "9个月流片、推理成本降约50%", "       <td>${p.commercialPotential}</td>
      <td><a href="${p.arxivUrl}" target="_blank" style="color:#58d68d;">arXiv</a></td>
    </tr>
  `).join('');
}
renderPapers(DATA.papers);
let sortDir = {};
function sortTable(col) {
  const key = ['title','conference','institution','commercialPotential'][col];
  sortDir[key] = !sortDir[key];
  const sorted = [...DATA.papers].sort((a,b) => {
    let va = a[key], vb = b[key];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return sortDir[key] ? -1 : 1;
    if (va > vb) return sortDir[key] ? 1 : -1;
    return 0;
  });
  renderPapers(sorted);
}

// (f) Analysis Cards
const analysisContainer = document.getElementById('analysisContainer');
analysisContainer.innerHTML = DATA.analysis.map((card, idx) => `
  <div class="analysis-card">
    <div class="analysis-header" onclick="toggleAnalysis(${idx})">
      <div><strong>${card.title}</strong><br><span style="color:var(--muted);font-size:0.85rem;">${card.summary || ''}</span></div>
      <span class="toggle" id="toggle-${idx}">+</span>
    </div>
    <div class="analysis-body" id="analysis-${idx}">${card.content}</div>
  </div>
`).join('');
function toggleAnalysis(idx) {
  const body = document.getElementById('analysis-'+idx);
  const toggle = document.getElementById('toggle-'+idx);
  body.classList.toggle('open');
  toggle.textContent = body.classList.contains('open') ? '−' : '+';
}

// (g) News Timeline
const timeline = document.getElementById('newsTimeline');
timeline.innerHTML = DATA.news.map(n => `
  <div class="tl-item ${n.importance}">
    <div class="tl-title">${n.title}</div>
    <div class="tl-meta">
      <span class="tag">${n.category}</span>
      <span class="tag">${n.importance === 'high' ? '高' : n.importance === 'medium' ? '中' : '低'}重要</span>
      ${n.keyData}
    </div>
  </div>
`).join('');
</script>
